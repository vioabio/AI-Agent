server {
    listen       80;
    server_name  localhost;

    # 前端静态文件根目录
    root   /usr/share/nginx/html;

    # SPA 路由回退（Vue Router History 模式）
    location / {
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 反向代理后端 API 请求
    # 部署前需要将 proxy_pass 地址替换为你的实际后端服务地址
    location ^~ /api/ {
        # TODO: 替换为你的后端服务地址
        proxy_pass http://your-backend-host:8123/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式支持（关键配置）
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_buffering off;           # 关闭缓冲，实现实时流式推送
        proxy_cache off;
        chunked_transfer_encoding off; # 逐块传输关闭
        proxy_read_timeout 600s;       # 长超时（10 分钟），支持 Agent 长时间执行

        proxy_intercept_errors off;
    }

    # 静态资源缓存策略（1 年）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    # 错误页面
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}