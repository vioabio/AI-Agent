spring:
  application:
    name: vio-ai-agent
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  # 默认排除 PGVector 和 JDBC 自动配置（本地开发无需数据库）
  # 生产环境请在 application-prod.yml 中移除这些排除项并配置数据库连接
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration
  ai:
    dashscope:
      # 🔒 API Key 请在 application-local.yml 中配置（该文件已被 .gitignore 忽略）
      # 如果没有 application-local.yml，请复制 application-local.example.yml 并填入你的 Key
      # api-key: your-dashscope-api-key-here
      chat:
        options:
          model: qwen-plus
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:1b
    mcp:
      client:
        sse:
          connections:
            server1:
              url: http://localhost:8127
        stdio:
          servers-configuration: classpath:mcp-servers.json
# 临时注释掉，便于大家开发调试和部署（实际需要启动 PgVector 数据库）
    vectorstore:
      pgvector:
        index-type: HNSW
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000 # Optional: Maximum number of documents per batch
server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.vio.vioaiagent.controller

# knife4j 因与 Spring Boot 3.5 不兼容暂时移除，改用 Swagger UI
# 🔒 SearchAPI Key 请在 application-local.yml 中配置（该文件已被 .gitignore 忽略）
search-api:
  # api-key: your-searchapi-key-here
# ==================== 安全配置 ====================
# 默认关闭，生产环境通过 application-prod.yml 覆盖为 true
vio:
  security:
    enabled: false
    # API Keys 列表 (key: "描述:协议ID")
    api-keys:
      "sk-local-dev-001": "本地开发令牌:default"
    # 文件操作允许的根目录
    allowed-paths:
      - ${user.dir}/tmp
    # 额外禁止的命令模式（内建 9 条已包含, 此处追加自定义）
    blocked-commands: []
  # ==================== 编排配置 ====================
  orchestration:
    # 会话状态机（默认关闭）
    session-state:
      enabled: false
    # Agent 并发限制
    max-concurrent-agents: 10
    # Agent 全局超时（分钟）
    agent-timeout-minutes: 10
    # 最大重试次数
    max-retries: 3
  # ==================== 记忆系统配置 ====================
  memory:
    enabled: false
    short-term-max-tokens: 4000
    recall-top-k: 5

# 修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG