# ============================================================
# 生产环境配置（--spring.profiles.active=prod）
# 覆盖 application.yml 中的默认配置
# 注意：不要提交 API Key 等敏感信息到此文件
# ============================================================
spring:
  autoconfigure:
    exclude:
      # 生产环境无 PostgreSQL，排除 PGVector 自动配置
      - org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration
      # 排除 DataSource 自动配置（无数据库）
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
    mcp:
      client:
        enabled: ${MCP_ENABLED:false}

# 生产环境日志级别
logging:
  level:
    org.springframework.ai: INFO
    com.vio.vioaiagent: INFO

# ==================== 企业级功能：生产环境全部启用 ====================
vio:
  security:
    enabled: true
    api-keys:
      "${VIO_API_KEY:sk-prod-change-me}": "生产环境令牌:default"
    allowed-paths:
      - ${user.dir}/tmp
    blocked-commands: []
  orchestration:
    session-state:
      enabled: true
    max-concurrent-agents: 10
    agent-timeout-minutes: 10
    max-retries: 3
  memory:
    enabled: true
    short-term-max-tokens: 4000
    recall-top-k: 5
