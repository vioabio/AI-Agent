name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend JAR
        run: ./mvnw clean package -DskipTests

      - name: Build Frontend
        working-directory: vio-ai-agent-frontend
        run: |
          npm ci
          npm run build

      - name: Docker Compose Up
        run: docker compose up -d --build

      - name: Health Check
        run: |
          sleep 30
          curl -f http://localhost:8123/api/health || exit 1
