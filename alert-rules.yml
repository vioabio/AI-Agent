groups:
  - name: vio-ai-agent
    rules:
      - alert: AgentErrorRateHigh
        expr: rate(error_count_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Agent 错误率过高 ({{ $value }}/s)"
          description: "过去 5 分钟 Agent 错误率超过 0.1/s，当前 traceId: {{ $labels.traceId }}"

      - alert: ToolCallSuccessRateLow
        expr: tool_call_success_total / tool_call_count_total < 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "工具调用成功率低于 80%"
          description: "当前成功率: {{ $value | humanizePercentage }}"

      - alert: ActiveAgentsNearLimit
        expr: agent_active_count > 8
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "活跃 Agent 数接近上限 ({{ $value }}/10)"

      - alert: AgentExecutionDurationHigh
        expr: histogram_quantile(0.99, rate(agent_execution_duration_bucket[10m])) > 600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Agent P99 执行耗时超过 10 分钟"
          description: "P99 耗时: {{ $value }}s"
